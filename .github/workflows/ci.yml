name: RecoLab CI

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recolab
          POSTGRES_PASSWORD: recolab
          POSTGRES_DB: recolab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recolab -d recolab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://recolab:recolab@localhost:5432/recolab
      VALKEY_URL: redis://localhost:6379
      JWT_SECRET: recolab-ci-secret
      OLLAMA_URL: http://localhost:11434

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run API integration tests
        run: npm run test:integration
        env:
          RUN_INTEGRATION_TESTS: "1"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run Playwright recruiter demo
        run: npm run test:e2e -w @recolab/web
